<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LEnsE / Colorimétrie</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<section class="info-box">
  <ul>
    <li><a href="#" class="active">xy to RGB</a></li>
    <li><a href="#">More...</a></li>
  </ul>
  <div class="panels">
    <article class="active-panel">
      <object type="text/html" data="xy2rgb.html" width="100%" height="500"></object>

    </article>
    <article>
      <p>
        Under construction...
      </p>
    </article>
  </div>
</section>


<script>
    let tabs = document.querySelectorAll(".info-box li a");
    let panels = document.querySelectorAll(".info-box article");

    for (let i = 0; i < tabs.length; i++) {
      let tab = tabs[i];
      setTabHandler(tab, i);
    }

    function setTabHandler(tab, tabPos) {
        tab.onclick = function () {
            for (let i = 0; i < tabs.length; i++) {
                tabs[i].className = "";
            }

            tab.className = "active";

            for (let i = 0; i < panels.length; i++) {
                panels[i].className = "";
            }

            panels[tabPos].className = "active-panel";
        };
    }
</script>


</body>
</html>
